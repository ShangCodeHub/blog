server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/share/nginx/html/Blog-Web/dist;
        index  index.html index.htm;
         try_files $uri $uri/ /index.html;

    }

  location /dev-api/{
        proxy_pass http://myapp:8800/;


  }


}
server {
    listen       9001;
    listen  [::]:9001;
    server_name  localhost;
    # 全文件开放上传大小限制
    client_max_body_size 10000m;   # 0 表示无限制

    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/share/nginx/html/Blog-Admin/dist;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

    }

     location /api/ {
        proxy_pass http://myapp:8800/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
    location /localFile/ {
        proxy_pass http://blog-backend:8800/localFile/;  # 注意末尾的斜杠
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


}
server {
    listen       9002;
    listen  [::]:9002;
    server_name  localhost;
    location /web/ {

        rewrite ^/mojian(.*)$ $1 break;

        # 代理到后端服务
        proxy_pass http://myapp:8800/;

        # 设置必要的 HTTP 头信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
